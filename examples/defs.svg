<!-- Project artwork library (goes into Project.artworkDefs — INNER content of <defs>, no wrapper tag).
     Define your character ONCE as <symbol>, reuse in every frame with <use href="#id"> →
     100% pixel-identical across all frames. Paths only — no external fonts/images needed. -->

<!-- Palette -->
<linearGradient id="bg-day" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#aee3ff"/>
  <stop offset="1" stop-color="#e8f7ff"/>
</linearGradient>
<linearGradient id="bg-night" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#0f1b3d"/>
  <stop offset="1" stop-color="#2a3a6b"/>
</linearGradient>
<radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
  <stop offset="0" stop-color="#ffe9a8" stop-opacity="0.9"/>
  <stop offset="1" stop-color="#ffe9a8" stop-opacity="0"/>
</radialGradient>

<!-- Mascot "Pip" — a round orange robot. Local coords: 200×260, feet at y=260. -->
<symbol id="pip" viewBox="0 0 200 260">
  <!-- antenna -->
  <path d="M100 28 L100 10" stroke="#e2571b" stroke-width="8" stroke-linecap="round"/>
  <circle cx="100" cy="8" r="10" fill="#ffd23f"/>
  <!-- body -->
  <path d="M100 30 C 152 30 176 66 176 120 L 176 190 C 176 232 148 252 100 252 C 52 252 24 232 24 190 L 24 120 C 24 66 48 30 100 30 Z" fill="#ff7a29"/>
  <path d="M100 42 C 144 42 164 72 164 120 L 164 150 L 36 150 L 36 120 C 36 72 56 42 100 42 Z" fill="#ff9a52"/>
  <!-- face plate -->
  <rect x="48" y="70" width="104" height="64" rx="30" fill="#241d33"/>
  <circle cx="80" cy="100" r="11" fill="#7ef0ff"/>
  <circle cx="120" cy="100" r="11" fill="#7ef0ff"/>
  <path d="M84 118 Q 100 130 116 118" stroke="#7ef0ff" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- belly badge -->
  <circle cx="100" cy="185" r="22" fill="#fff3e4"/>
  <path d="M100 172 L 105 182 L 116 183 L 108 191 L 110 202 L 100 196 L 90 202 L 92 191 L 84 183 L 95 182 Z" fill="#ff7a29"/>
  <!-- feet -->
  <ellipse cx="70" cy="252" rx="22" ry="8" fill="#e2571b"/>
  <ellipse cx="130" cy="252" rx="22" ry="8" fill="#e2571b"/>
</symbol>

<!-- Pip variant: right arm waving (same body, one extra limb group) -->
<symbol id="pip-wave" viewBox="0 0 240 260">
  <use href="#pip" x="0" y="0" width="200" height="260"/>
  <path d="M176 130 C 210 110 224 84 220 58" stroke="#ff7a29" stroke-width="20" fill="none" stroke-linecap="round"/>
  <circle cx="222" cy="52" r="16" fill="#ff9a52"/>
</symbol>

<!-- Prop: a small pennant flag -->
<symbol id="prop-flag" viewBox="0 0 80 120">
  <rect x="36" y="6" width="6" height="110" rx="3" fill="#8a6d4b"/>
  <path d="M42 10 L 78 24 L 42 38 Z" fill="#ff5d73"/>
</symbol>
